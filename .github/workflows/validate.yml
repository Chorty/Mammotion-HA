name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -r requirements_test.txt
      - name: Ruff
        run: |
          ruff check custom_components tests
          ruff format --check custom_components tests
      - name: Mypy
        run: mypy --follow-imports=skip custom_components/mammotion
      - name: Tests
        run: pytest --cov=custom_components.mammotion --cov-report=term-missing tests
      - name: Validate JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          for path in Path("custom_components/mammotion").rglob("*.json"):
              json.loads(path.read_text())
          PY

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
